spring.application.name=stock-seckill-system
server.port=8080

# 数据库连接配置
spring.datasource.url=jdbc:mysql://localhost:3306/stock_seckill_system?useUnicode=true&characterEncoding=utf-8&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=0123456789
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis配置
mybatis.type-aliases-package=com.example.stock_seckill_system.model
mybatis.mapper-locations=classpath:mappers/*.xml

# 日志配置
logging.level.com.example.stock_seckill_system=info

# Redis配置
spring.data.redis.host=localhost
spring.data.redis.port=6379

# 读写分离配置
# 从库 URL (本地测试时可与主库相同)
spring.datasource.slave-url=jdbc:mysql://localhost:3306/stock_seckill_system?useUnicode=true&characterEncoding=utf-8&serverTimezone=UTC

# 缓存配置
cache.enable=true

# RabbitMQ配置
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.template.retry.enabled=true
spring.rabbitmq.template.retry.initial-interval=1000ms
spring.rabbitmq.template.retry.max-attempts=3
spring.rabbitmq.template.retry.max-interval=10000ms
spring.rabbitmq.template.retry.multiplier=2
spring.rabbitmq.listener.simple.auto-startup=false

# Nacos 服务注册与配置中心
spring.cloud.nacos.discovery.server-addr=127.0.0.1:8848
spring.cloud.nacos.discovery.namespace=public
spring.cloud.nacos.discovery.group=DEFAULT_GROUP

spring.cloud.nacos.config.server-addr=127.0.0.1:8848
spring.cloud.nacos.config.namespace=public
spring.cloud.nacos.config.group=DEFAULT_GROUP
spring.cloud.nacos.config.file-extension=properties
spring.config.import=optional:nacos:${spring.application.name}.properties?group=DEFAULT_GROUP&refreshEnabled=true

# 暴露必要端点用于联调观察
management.endpoints.web.exposure.include=health,info,refresh,metrics
management.endpoint.health.show-details=always

# Resilience4j 流量治理配置（限流 + 熔断 + 降级）

resilience4j.ratelimiter.instances.traffic-governance.limit-for-period=8
resilience4j.ratelimiter.instances.traffic-governance.limit-refresh-period=1s
resilience4j.ratelimiter.instances.traffic-governance.timeout-duration=0

resilience4j.circuitbreaker.instances.traffic-governance.register-health-indicator=true
resilience4j.circuitbreaker.instances.traffic-governance.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.traffic-governance.sliding-window-size=20
resilience4j.circuitbreaker.instances.traffic-governance.minimum-number-of-calls=10
resilience4j.circuitbreaker.instances.traffic-governance.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.traffic-governance.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.traffic-governance.permitted-number-of-calls-in-half-open-state=5
resilience4j.circuitbreaker.instances.traffic-governance.automatic-transition-from-open-to-half-open-enabled=true
