<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品详情 - 商品库存与秒杀系统</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .detail-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .product-detail {
            display: flex;
            gap: 30px;
            margin-top: 30px;
        }
        
        .product-image {
            flex: 1;
            max-width: 500px;
        }
        
        .product-image img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .product-info {
            flex: 1;
        }
        
        .product-info h1 {
            font-size: 28px;
            margin-bottom: 15px;
            color: #333;
        }
        
        .product-info .price {
            font-size: 32px;
            color: #e74c3c;
            font-weight: bold;
            margin-bottom: 20px;
        }
        
        .product-info .stock {
            font-size: 16px;
            color: #666;
            margin-bottom: 20px;
        }
        
        .product-info .stock span {
            font-weight: bold;
            color: #27ae60;
        }
        
        .product-info .seckill-info {
            background: #fff3cd;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            border-left: 4px solid #ffc107;
        }
        
        .product-info .seckill-info .seckill-price {
            font-size: 28px;
            color: #e74c3c;
            font-weight: bold;
        }
        
        .product-info .description {
            line-height: 1.6;
            color: #666;
            margin-bottom: 30px;
        }
        
        .product-actions {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        
        .product-actions .btn {
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .product-actions .btn-primary {
            background: #3498db;
            color: white;
        }
        
        .product-actions .btn-primary:hover {
            background: #2980b9;
        }
        
        .product-actions .btn-seckill {
            background: #e74c3c;
            color: white;
        }
        
        .product-actions .btn-seckill:hover {
            background: #c0392b;
        }
        
        .product-actions .btn-cart {
            background: #27ae60;
            color: white;
        }
        
        .product-actions .btn-cart:hover {
            background: #219150;
        }
        
        .back-link {
            display: inline-block;
            margin-top: 30px;
            color: #3498db;
            text-decoration: none;
        }
        
        .back-link:hover {
            text-decoration: underline;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            font-size: 18px;
            color: #666;
        }
        
        .error {
            text-align: center;
            padding: 50px;
            color: #e74c3c;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>商品库存与秒杀系统</h1>
            <nav>
                <ul>
                    <li><a href="/pages/index.html">首页</a></li>
                    <li><a href="/pages/index.html">商品列表</a></li>
                    <li><a href="/pages/seckill-test.html">秒杀测试</a></li>
                    <li><a href="#">个人中心</a></li>
                </ul>
            </nav>
        </header>
        
        <main class="detail-container">
            <div id="loading" class="loading">
                <p>加载中...</p>
            </div>
            
            <div id="error" class="error" style="display: none;">
                <p>商品不存在或加载失败</p>
                <a href="/index.html" class="back-link">返回首页</a>
            </div>
            
            <div id="productDetail" style="display: none;">
                <div class="product-detail">
                    <div class="product-image">
                        <img id="productImage" src="" alt="商品图片">
                    </div>
                    <div class="product-info">
                        <h1 id="productName">商品名称</h1>
                        <p class="price">¥<span id="productPrice">0.00</span></p>
                        
                        <div class="stock">
                            库存：<span id="productStock">0</span> 件
                        </div>
                        
                        <div id="seckillInfo" class="seckill-info" style="display: none;">
                            <h3>🔥 限时秒杀</h3>
                            <p>秒杀价格：<span class="seckill-price">¥<span id="seckillPrice">0.00</span></span></p>
                            <p>秒杀库存：<span id="seckillStock">0</span> 件</p>
                        </div>
                        
                        <div class="description">
                            <h3>商品描述</h3>
                            <p id="productDescription">商品描述信息</p>
                        </div>
                        
                        <div class="product-actions">
                            <button id="addToCartBtn" class="btn btn-cart">加入购物车</button>
                            <button id="seckillBtn" class="btn btn-seckill">立即秒杀</button>
                        </div>
                    </div>
                </div>
                
                <a href="/index.html" class="back-link">← 返回商品列表</a>
            </div>
        </main>
        
        <footer>
            <p>&copy; 2026 商品库存与秒杀系统</p>
        </footer>
    </div>
    
    <script src="/js/detail.js"></script>
</body>
</html>
