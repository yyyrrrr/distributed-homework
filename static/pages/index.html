<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品库存与秒杀系统</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>商品库存与秒杀系统</h1>
            <nav>
                <ul>
                    <li><a href="/pages/index.html">首页</a></li>
                    <li><a href="/pages/index.html">商品列表</a></li>
                    <li><a href="/pages/seckill-test.html">秒杀测试</a></li>
                    <li><a href="#">个人中心</a></li>
                </ul>
            </nav>
        </header>
        
        <main>
            <section class="hero">
                <h2>限时秒杀</h2>
                <p>抢购商品，限时优惠！</p>
                <button class="btn">立即抢购</button>
            </section>
            
            <section class="products">
                <h2>热门商品</h2>
                <div class="product-list">
                    <div class="product-item">
                        <a href="/detail?id=1">
                            <img src="/images/product1.jpg" alt="商品1">
                            <h3>商品1</h3>
                            <p>价格：¥99.99</p>
                        </a>
                        <button class="btn">加入购物车</button>
                    </div>
                    <div class="product-item">
                        <a href="/detail?id=2">
                            <img src="/images/product2.jpg" alt="商品2">
                            <h3>商品2</h3>
                            <p>价格：¥199.99</p>
                        </a>
                        <button class="btn">加入购物车</button>
                    </div>
                    <div class="product-item">
                        <a href="/detail?id=3">
                            <img src="/images/product3.jpg" alt="商品3">
                            <h3>商品3</h3>
                            <p>价格：¥299.99</p>
                        </a>
                        <button class="btn">加入购物车</button>
                    </div>
                </div>
            </section>
        </main>
        
        <footer>
            <p>&copy; 2026 商品库存与秒杀系统</p>
        </footer>
    </div>
    <script src="/js/main.js"></script>
</body>
</html>
